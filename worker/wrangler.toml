name = "wtbs-suggest"
main = "suggest-worker.js"
compatibility_date = "2024-11-01"

# Public (non-secret) config.
[vars]
MAIL_TO = "wilson.price@gmail.com"          # where the daily digest is sent
MAIL_FROM = "onboarding@resend.dev"         # Resend test sender (to your own inbox)
ALLOW_ORIGIN = "https://wtbs.show"          # canonical site origin (scheme+host only)

# Daily digest time — cron is in UTC. "0 14 * * *" = 14:00 UTC (~9am ET / 6am PT).
[triggers]
crons = ["0 14 * * *"]

# KV queue that holds suggestions between digests.
# Create it once:  wrangler kv namespace create SUGGESTIONS
# then paste the printed id below.
[[kv_namespaces]]
binding = "SUGGESTIONS"
id = "0dea830aaffa4483ba59bf66a23db2ed"

# RESEND_API_KEY is a SECRET — set it with:  wrangler secret put RESEND_API_KEY
